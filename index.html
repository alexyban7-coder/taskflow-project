<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tareas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 min-h-screen transition-colors duration-300">

    <div class="max-w-3xl mx-auto p-4 md:p-12">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-white">Lista de tareas</h1>
            <button id="dark-toggle" class="p-2 bg-white dark:bg-slate-800 rounded-xl shadow-sm border dark:border-slate-700">
                <span id="theme-icon">🌙</span>
            </button>
        </header>

        <!-- Formulario Adaptado a Móviles -->
        <section class="mb-10">
            <form id="task-form" class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-lg flex flex-col gap-3 border dark:border-slate-700">
                
                <input type="text" id="task-input" placeholder="¿Qué sigue?" required
                    class="p-3 bg-gray-50 dark:bg-slate-700 dark:text-white rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                    <select id="category-select" class="bg-gray-50 dark:bg-slate-700 dark:text-white p-3 rounded-xl text-sm outline-none">
                        <option value="hogar">🏠Hogar</option>
                        <option value="personal">🍵Personal</option>
                        <option value="estudios">📚 Estudios</option>
                    </select>

                    <select id="priority-select" class="bg-gray-50 dark:bg-slate-700 dark:text-white p-3 rounded-xl text-sm outline-none font-bold">
                        <option value="alta" class="text-red-500">🔴 Alta</option>
                        <option value="media" class="text-yellow-500" selected>🟡 Media</option>
                        <option value="baja" class="text-green-500">🟢 Baja</option>
                    </select>

                    <!-- Botón ocupa 2 columnas en móvil, 1 en desktop -->
                    <button type="submit" class="col-span-2 md:col-span-1 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all active:scale-95 py-3 md:py-0">
                        Añadir
                    </button>
                </div>
            </form>
        </section>

        <!-- Lista -->
        <div id="task-list" class="space-y-3"></div>
    </div>

    <script src="app.js"></script>
    

    <
</body>
</html>
